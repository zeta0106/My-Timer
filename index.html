<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0f;
      --primary: #a855f7;
      --primary-dark: #7B2FBE;
      --secondary: #22d3ee;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --warning: #f97316;
      --danger: #ef4444;
      --success: #34d399;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      color: var(--text);
    }

    /* Background Effects */
    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; background: #fff; border-radius: 50%; opacity: 0;
      animation: twinkle var(--duration, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .nebula {
      position: fixed; border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0; opacity: 0.12;
    }
    .nebula-1 {
      width: 70vw; height: 70vw; max-width: 800px; max-height: 800px;
      background: radial-gradient(circle, var(--primary-dark) 0%, transparent 70%);
      top: -15%; left: -15%; animation: drift 25s ease-in-out infinite alternate;
    }
    .nebula-2 {
      width: 60vw; height: 60vw; max-width: 700px; max-height: 700px;
      background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
      bottom: -20%; right: -15%; animation: drift 30s ease-in-out infinite alternate-reverse;
    }
    .nebula-3 {
      width: 50vw; height: 50vw; max-width: 600px; max-height: 600px;
      background: radial-gradient(circle, #4c1d95 0%, transparent 70%);
      top: 40%; left: 40%; animation: pulse-nebula 15s ease-in-out infinite;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, -30px) scale(1.1); }
    }
    @keyframes pulse-nebula {
      0%, 100% { opacity: 0.08; transform: scale(1); }
      50% { opacity: 0.18; transform: scale(1.15); }
    }

    .shooting-star {
      position: fixed; width: 120px; height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
      border-radius: 2px; transform: rotate(-35deg); opacity: 0;
      pointer-events: none; z-index: 1; animation: shoot 1.2s ease-out forwards;
    }
    @keyframes shoot {
      0% { opacity: 1; transform: translateX(0) translateY(0) rotate(-35deg); }
      100% { opacity: 0; transform: translateX(400px) translateY(300px) rotate(-35deg); }
    }

    #scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      opacity: 0.3;
    }

    /* Layout */
    #app {
      position: relative; z-index: 10; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }

    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; z-index: 50;
      background: linear-gradient(to bottom, rgba(10,10,15,0.8), transparent);
    }
    #dashboard-clock {
      font-size: 0.9rem; letter-spacing: 2px; color: var(--secondary);
      text-shadow: 0 0 10px rgba(34,211,238,0.4);
    }
    #top-actions { display: flex; gap: 12px; }
    .icon-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      color: var(--text); width: 40px; height: 40px; border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: all 0.3s ease; backdrop-filter: blur(10px);
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.1); border-color: var(--primary);
      box-shadow: 0 0 20px rgba(168,85,247,0.4); transform: translateY(-2px);
    }

    /* Main Card */
    #card {
      width: 100%; max-width: 680px;
      background: var(--glass); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: 28px;
      padding: 36px 32px 40px; /* 加多咗少少底部 padding */
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 80px rgba(168,85,247,0.08);
      display: flex; flex-direction: column; gap: 28px; /* 由 24px 加到 28px */
      position: relative; overflow: hidden;
    }
    #card::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(168,85,247,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Tabs */
    #tabs { display: flex; gap: 12px; justify-content: center; position: relative; z-index: 1; }
    .tab {
      padding: 10px 28px; border-radius: 999px; border: 1px solid transparent;
      background: transparent; color: var(--text-dim); font-family: inherit;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
      letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .tab.active {
      color: #fff; background: rgba(168,85,247,0.12);
      border-color: rgba(168,85,247,0.35);
      box-shadow: 0 0 25px rgba(168,85,247,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Timer Display */
    .display-area {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      position: relative; z-index: 1; padding: 20px 0;
    }

    #time-display {
      font-size: 4rem; font-weight: 700; letter-spacing: 6px; color: #fff;
      text-shadow: 0 0 12px rgba(34,211,238,0.4), 0 0 40px rgba(34,211,238,0.15);
      display: flex; align-items: center; gap: 6px; line-height: 1;
    }
    #time-display.running { animation: pulse-glow 2s ease-in-out infinite; }
    #time-display.warning {
      color: var(--warning);
      text-shadow: 0 0 12px rgba(249,115,22,0.6), 0 0 40px rgba(249,115,22,0.3);
      animation: pulse-glow 0.5s ease-in-out infinite;
    }
    #time-display.flash { animation: flash-red 0.4s ease-in-out 3; }
    @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }
    @keyframes flash-red {
      0%, 100% { color: #fff; text-shadow: 0 0 12px rgba(34,211,238,0.4); }
      50% { color: var(--danger); text-shadow: 0 0 20px rgba(239,68,68,0.8); }
    }

    .time-segment {
      width: 2.3ch; background: transparent; border: none; color: inherit;
      font: inherit; text-align: center; padding: 8px 4px; border-radius: 10px;
      transition: all 0.3s ease; outline: none; caret-color: var(--secondary);
    }
    .time-segment:focus {
      background: rgba(34,211,238,0.08);
      box-shadow: 0 0 0 2px rgba(34,211,238,0.3), 0 0 20px rgba(34,211,238,0.15);
    }
    .time-segment:disabled { opacity: 1; cursor: default; }
    .time-segment::-webkit-outer-spin-button,
    .time-segment::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .time-segment { -moz-appearance: textfield; }

    .time-separator { opacity: 0.5; margin-top: -6px; }

    #time-underline {
      width: 220px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--secondary), transparent);
      opacity: 0.4; border-radius: 2px; box-shadow: 0 0 10px rgba(34,211,238,0.3);
    }

    /* Quick Add & Presets */
    .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; position: relative; z-index: 1; }
    .pill-btn {
      padding: 8px 18px; border-radius: 999px; border: 1px solid rgba(168,85,247,0.25);
      background: rgba(168,85,247,0.08); color: var(--text); font-family: inherit;
      font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.5px;
    }
    .pill-btn:hover {
      background: rgba(168,85,247,0.18); border-color: rgba(168,85,247,0.5);
      box-shadow: 0 0 15px rgba(168,85,247,0.2); transform: translateY(-2px);
    }

    #presets-area { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    #presets-header { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
    #presets-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
    .preset-btn {
      position: relative; padding: 10px 16px; border-radius: 12px;
      border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03);
      color: var(--text); font-family: inherit; font-size: 0.8rem;
      cursor: pointer; transition: all 0.3s ease; min-width: 100px;
      text-align: center; display: flex; flex-direction: column; gap: 2px;
    }
    .preset-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(168,85,247,0.3); }
    .preset-btn .preset-name { font-weight: 600; font-size: 0.8rem; }
    .preset-btn .preset-time { font-size: 0.7rem; color: var(--text-dim); }
    .preset-edit {
      position: absolute; top: 4px; right: 4px; width: 18px; height: 18px;
      border-radius: 4px; border: none; background: rgba(255,255,255,0.08);
      color: var(--text-dim); font-size: 0.65rem; cursor: pointer; opacity: 0;
      transition: opacity 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .preset-btn:hover .preset-edit { opacity: 1; }
    .preset-edit:hover { background: var(--primary); color: #fff; }

    /* Controls */
    .controls {
      display: flex; flex-direction: column; gap: 12px;
      position: relative; z-index: 1;
      margin-top: 12px; /* 加咗呢行：按鈕同上面內容之間多啲空間 */
    }
    .btn-row { display: flex; gap: 12px; }
    .btn {
      padding: 16px 24px; border-radius: 16px; border: none; font-family: inherit;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
      letter-spacing: 1px; display: flex; align-items: center; justify-content: center;
      gap: 8px; flex: 1;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: #fff; border: 1px solid rgba(168,85,247,0.4);
      box-shadow: 0 0 25px rgba(168,85,247,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-primary:hover {
      box-shadow: 0 0 35px rgba(168,85,247,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .btn-primary:active { transform: translateY(0) scale(0.98); }

    .btn-secondary {
      background: rgba(255,255,255,0.05); color: var(--text);
      border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1); border-color: rgba(34,211,238,0.3);
      box-shadow: 0 0 20px rgba(34,211,238,0.1); transform: translateY(-2px);
    }
    .btn-full { width: 100%; }
    .hidden { display: none !important; }

    /* Stopwatch */
    #stopwatch-display {
      font-size: 3.4rem; font-weight: 700; letter-spacing: 4px; color: #fff;
      text-shadow: 0 0 12px rgba(34,211,238,0.4), 0 0 40px rgba(34,211,238,0.15);
      text-align: center; line-height: 1;
    }
    .ms-digits { font-size: 0.5em; color: var(--secondary); margin-left: 4px; }

    #laps-container {
      max-height: 200px; overflow-y: auto; border-radius: 16px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 8px;
    }
    #laps-container::-webkit-scrollbar { width: 6px; }
    #laps-container::-webkit-scrollbar-track { background: transparent; }
    #laps-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    
    .lap-row {
      display: flex; justify-content: space-between; padding: 8px 12px;
      border-radius: 10px; font-size: 0.85rem; transition: background 0.2s;
    }
    .lap-row:hover { background: rgba(255,255,255,0.03); }
    .lap-row.fastest { color: var(--success); background: rgba(52,211,153,0.06); }
    .lap-row.slowest { color: var(--danger); background: rgba(239,68,68,0.06); }
    .lap-num { color: var(--text-dim); width: 60px; }
    .lap-split { font-weight: 600; }
    .lap-total { color: var(--text-dim); font-size: 0.8rem; }

    #laps-header { display: flex; justify-content: space-between; align-items: center; padding: 0 8px; margin-bottom: 4px; }
    #laps-title { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
    #clear-laps {
      font-size: 0.7rem; padding: 4px 10px; border-radius: 8px;
      border: 1px solid var(--glass-border); background: transparent;
      color: var(--text-dim); cursor: pointer; font-family: inherit;
    }
    #clear-laps:hover { color: var(--danger); border-color: var(--danger); }

    /* Completion Overlay */
    #completion-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,10,15,0.85); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    #completion-overlay.show { opacity: 1; pointer-events: all; }
    #completion-message {
      font-size: 2.5rem; font-weight: 900; color: #fff;
      text-shadow: 0 0 30px rgba(168,85,247,0.6), 0 0 60px rgba(34,211,238,0.3);
      text-align: center; animation: pulse-glow 1.5s ease-in-out infinite;
    }
    #completion-sub { color: var(--text-dim); font-size: 1rem; letter-spacing: 2px; }

    /* Responsive */
    @media (max-width: 640px) {
      #card { padding: 28px 20px 32px; border-radius: 20px; gap: 24px; }
      #time-display { font-size: 2.8rem; letter-spacing: 3px; gap: 4px; }
      #stopwatch-display { font-size: 2.2rem; }
      .btn { padding: 14px 20px; font-size: 0.95rem; }
      .pill-btn { padding: 6px 14px; font-size: 0.8rem; }
      #completion-message { font-size: 1.8rem; }
      .display-area { padding: 12px 0; }
    }
    @media (max-width: 380px) {
      #time-display { font-size: 2.2rem; letter-spacing: 2px; }
      #stopwatch-display { font-size: 1.8rem; }
      .preset-btn { min-width: 80px; padding: 8px 10px; }
    }
  </style>
</head>
<body>

  <div id="starfield"></div>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div id="scanlines"></div>

  <div id="completion-overlay">
    <div id="completion-message">Time is Up! 🚀</div>
    <div id="completion-sub">Mission elapsed</div>
    <button class="btn btn-primary" style="max-width: 200px;" onclick="dismissCompletion()">Dismiss</button>
  </div>

  <div id="top-bar">
    <div id="dashboard-clock">00:00:00</div>
    <div id="top-actions">
      <button class="icon-btn" id="btn-mute" title="Toggle sound">🔊</button>
      <button class="icon-btn" id="btn-fullscreen" title="Toggle fullscreen">⛶</button>
    </div>
  </div>

  <div id="app">
    <div id="card">
      
      <div id="tabs">
        <button class="tab active" data-tab="timer" onclick="switchTab('timer')">
          <span>⏱</span> Timer
        </button>
        <button class="tab" data-tab="stopwatch" onclick="switchTab('stopwatch')">
          <span>⏲</span> Stopwatch
        </button>
      </div>

      <!-- TIMER VIEW -->
      <div id="timer-view">
        <div class="display-area">
          <div id="time-display">
            <input type="number" class="time-segment" id="h" min="0" max="99" value="00">
            <span class="time-separator">:</span>
            <input type="number" class="time-segment" id="m" min="0" max="59" value="05">
            <span class="time-separator">:</span>
            <input type="number" class="time-segment" id="s" min="0" max="59" value="00">
          </div>
          <div id="time-underline"></div>
        </div>

        <div class="quick-actions">
          <button class="pill-btn" onclick="addTime(30)">+0:30</button>
          <button class="pill-btn" onclick="addTime(60)">+1:00</button>
          <button class="pill-btn" onclick="addTime(300)">+5:00</button>
          <button class="pill-btn" onclick="addTime(600)">+10:00</button>
        </div>

        <div id="presets-area">
          <div id="presets-header">
            <span id="presets-label">Presets</span>
          </div>
          <div class="quick-actions" id="presets-list"></div>
        </div>

        <div class="controls">
          <button id="btn-timer-start" class="btn btn-primary btn-full" onclick="toggleTimer()">▶ START</button>
          <div id="timer-controls-active" class="btn-row hidden">
            <button id="btn-timer-pause" class="btn btn-primary" onclick="toggleTimer()">⏸ PAUSE</button>
            <button class="btn btn-secondary" onclick="resetTimer()">🔄 RESET</button>
          </div>
        </div>
      </div>

      <!-- STOPWATCH VIEW -->
      <div id="stopwatch-view" class="hidden">
        <div class="display-area">
          <div id="stopwatch-display">
            <span id="sw-time">00:00:00</span><span class="ms-digits" id="sw-ms">.00</span>
          </div>
          <div id="time-underline"></div>
        </div>

        <div class="controls">
          <button id="btn-sw-start" class="btn btn-primary btn-full" onclick="toggleStopwatch()">▶ START</button>
          <div id="sw-controls-active" class="btn-row hidden">
            <button id="btn-sw-pause" class="btn btn-primary" onclick="toggleStopwatch()">⏸ PAUSE</button>
            <button class="btn btn-secondary" onclick="recordLap()">🚩 LAP</button>
          </div>
          <div id="sw-controls-paused" class="btn-row hidden">
            <button id="btn-sw-resume" class="btn btn-primary" onclick="toggleStopwatch()">▶ RESUME</button>
            <button class="btn btn-secondary" onclick="resetStopwatch()">🔄 RESET</button>
          </div>
        </div>

        <div id="laps-area">
          <div id="laps-header">
            <span id="laps-title">Lap History</span>
            <button id="clear-laps" onclick="clearLaps()">Clear</button>
          </div>
          <div id="laps-container">
            <div id="laps-list"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const storage = {
      getMute: () => localStorage.getItem('cosmos_mute') === 'true',
      setMute: v => localStorage.setItem('cosmos_mute', v),
      getPresets: () => { try { return JSON.parse(localStorage.getItem('cosmos_presets')) || []; } catch { return []; } },
      setPresets: v => localStorage.setItem('cosmos_presets', JSON.stringify(v)),
      getLastTimer: () => { const v = parseInt(localStorage.getItem('cosmos_lastTimer')); return isNaN(v) ? 300 : v; },
      setLastTimer: v => localStorage.setItem('cosmos_lastTimer', v),
    };

    let muted = storage.getMute();
    let activeTab = 'timer';

    const timer = { total: 300, remaining: 300, status: 'idle', interval: null, endTime: 0 };
    const stopwatch = { startTime: 0, elapsed: 0, status: 'idle', raf: null, laps: [] };

    const els = {
      h: document.getElementById('h'), m: document.getElementById('m'), s: document.getElementById('s'),
      timeDisplay: document.getElementById('time-display'),
      btnTimerStart: document.getElementById('btn-timer-start'),
      timerControlsActive: document.getElementById('timer-controls-active'),
      btnMute: document.getElementById('btn-mute'),
      dashboardClock: document.getElementById('dashboard-clock'),
      completionOverlay: document.getElementById('completion-overlay'),
      presetsList: document.getElementById('presets-list'),
      swTime: document.getElementById('sw-time'), swMs: document.getElementById('sw-ms'),
      btnSwStart: document.getElementById('btn-sw-start'),
      swControlsActive: document.getElementById('sw-controls-active'),
      swControlsPaused: document.getElementById('sw-controls-paused'),
      lapsList: document.getElementById('laps-list'),
      lapsArea: document.getElementById('laps-area'),
    };

    function init() {
      createStarfield();
      startShootingStars();
      updateClock();
      setInterval(updateClock, 1000);
      updateMuteIcon();
      loadTimerFromStorage();
      renderPresets();
      setupInputs();
      setupKeyboard();
      setupWheel();
      document.body.addEventListener('click', () => {
        if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
      }, { once: true });
    }

    function createStarfield() {
      const container = document.getElementById('starfield');
      for (let i = 0; i < 200; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--delay', (Math.random() * 5) + 's');
        container.appendChild(star);
      }
    }

    function startShootingStars() {
      const trigger = () => {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        star.style.top = (Math.random() * 40) + '%';
        star.style.left = (Math.random() * 40) + '%';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 1200);
        setTimeout(trigger, 8000 + Math.random() * 4000);
      };
      setTimeout(trigger, 3000);
    }

    function updateClock() {
      els.dashboardClock.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('timer-view').classList.toggle('hidden', tab !== 'timer');
      document.getElementById('stopwatch-view').classList.toggle('hidden', tab !== 'stopwatch');
      if (tab === 'stopwatch') els.lapsArea.style.display = stopwatch.laps.length ? 'block' : 'none';
    }

    function getInputSeconds() {
      const h = parseInt(els.h.value) || 0;
      const m = Math.min(59, parseInt(els.m.value) || 0);
      const s = Math.min(59, parseInt(els.s.value) || 0);
      return h * 3600 + m * 60 + s;
    }

    function setInputSeconds(totalSecs) {
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      els.h.value = String(h).padStart(2, '0');
      els.m.value = String(m).padStart(2, '0');
      els.s.value = String(s).padStart(2, '0');
    }

    function loadTimerFromStorage() {
      const secs = storage.getLastTimer();
      timer.total = secs; timer.remaining = secs;
      setInputSeconds(secs);
    }

    function saveTimerToStorage() {
      if (timer.status === 'idle') storage.setLastTimer(getInputSeconds());
    }

    function addTime(seconds) {
      if (timer.status !== 'idle') return;
      let current = getInputSeconds() + seconds;
      setInputSeconds(current);
      saveTimerToStorage();
    }

    function toggleTimer() {
      if (timer.status === 'running') pauseTimer();
      else startTimer();
    }

    function startTimer() {
      if (timer.status === 'idle') {
        timer.total = getInputSeconds();
        timer.remaining = timer.total;
        if (timer.total <= 0) return;
      }
      timer.status = 'running';
      timer.endTime = Date.now() + timer.remaining * 1000;
      [els.h, els.m, els.s].forEach(i => i.disabled = true);
      els.timeDisplay.classList.add('running');
      els.btnTimerStart.classList.add('hidden');
      els.timerControlsActive.classList.remove('hidden');
      
      timer.interval = setInterval(() => {
        const now = Date.now();
        const rem = Math.ceil((timer.endTime - now) / 1000);
        if (rem <= 0) {
          timer.remaining = 0;
          updateTimerDisplay();
          completeTimer();
        } else {
          timer.remaining = rem;
          updateTimerDisplay();
          checkWarning();
        }
      }, 100);
    }

    function pauseTimer() {
      timer.status = 'paused';
      clearInterval(timer.interval);
      els.timeDisplay.classList.remove('running');
      els.btnTimerStart.textContent = '▶ RESUME';
      els.btnTimerStart.classList.remove('hidden');
      els.timerControlsActive.classList.add('hidden');
    }

    function resetTimer() {
      timer.status = 'idle';
      clearInterval(timer.interval);
      timer.remaining = timer.total;
      updateTimerDisplay();
      els.timeDisplay.classList.remove('running', 'warning', 'flash');
      [els.h, els.m, els.s].forEach(i => i.disabled = false);
      els.btnTimerStart.textContent = '▶ START';
      els.btnTimerStart.classList.remove('hidden');
      els.timerControlsActive.classList.add('hidden');
    }

    function completeTimer() {
      clearInterval(timer.interval);
      timer.status = 'idle';
      [els.h, els.m, els.s].forEach(i => i.disabled = false);
      els.btnTimerStart.textContent = '▶ START';
      els.btnTimerStart.classList.remove('hidden');
      els.timerControlsActive.classList.add('hidden');
      els.timeDisplay.classList.add('flash');
      els.timeDisplay.classList.remove('running', 'warning');
      playAlarm();
      showNotification('⏰ Time is up!', 'Your countdown has reached zero.');
      els.completionOverlay.classList.add('show');
    }

    function dismissCompletion() {
      els.completionOverlay.classList.remove('show');
      els.timeDisplay.classList.remove('flash');
      resetTimer();
    }

    function updateTimerDisplay() { setInputSeconds(timer.remaining); }

    function checkWarning() {
      const pct = timer.total > 0 ? timer.remaining / timer.total : 1;
      if (pct <= 0.1 && timer.remaining > 0) els.timeDisplay.classList.add('warning');
      else els.timeDisplay.classList.remove('warning');
    }

    /* Stopwatch */
    function toggleStopwatch() {
      if (stopwatch.status === 'running') pauseStopwatch();
      else startStopwatch();
    }

    function startStopwatch() {
      stopwatch.status = 'running';
      stopwatch.startTime = Date.now() - stopwatch.elapsed;
      els.btnSwStart.classList.add('hidden');
      els.swControlsActive.classList.remove('hidden');
      els.swControlsPaused.classList.add('hidden');
      function tick() {
        if (stopwatch.status !== 'running') return;
        stopwatch.elapsed = Date.now() - stopwatch.startTime;
        updateStopwatchDisplay();
        stopwatch.raf = requestAnimationFrame(tick);
      }
      stopwatch.raf = requestAnimationFrame(tick);
    }

    function pauseStopwatch() {
      stopwatch.status = 'paused';
      cancelAnimationFrame(stopwatch.raf);
      els.swControlsActive.classList.add('hidden');
      els.swControlsPaused.classList.remove('hidden');
    }

    function resetStopwatch() {
      stopwatch.status = 'idle';
      cancelAnimationFrame(stopwatch.raf);
      stopwatch.elapsed = 0;
      updateStopwatchDisplay();
      els.btnSwStart.classList.remove('hidden');
      els.swControlsActive.classList.add('hidden');
      els.swControlsPaused.classList.add('hidden');
    }

    function updateStopwatchDisplay() {
      const ms = stopwatch.elapsed;
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const milli = Math.floor((ms % 1000) / 10);
      els.swTime.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      els.swMs.textContent = `.${String(milli).padStart(2,'0')}`;
    }

    function recordLap() {
      if (stopwatch.status !== 'running') return;
      const lastTotal = stopwatch.laps.length > 0 ? stopwatch.laps[stopwatch.laps.length - 1].total : 0;
      stopwatch.laps.push({ number: stopwatch.laps.length + 1, split: stopwatch.elapsed - lastTotal, total: stopwatch.elapsed });
      renderLaps();
      els.lapsArea.style.display = 'block';
    }

    function renderLaps() {
      if (!stopwatch.laps.length) { els.lapsList.innerHTML = ''; return; }
      const splits = stopwatch.laps.map(l => l.split);
      const minSplit = Math.min(...splits), maxSplit = Math.max(...splits);
      els.lapsList.innerHTML = stopwatch.laps.slice().reverse().map(lap => {
        const cls = lap.split === minSplit && stopwatch.laps.length > 1 ? 'fastest' : lap.split === maxSplit && stopwatch.laps.length > 1 ? 'slowest' : '';
        return `<div class="lap-row ${cls}"><span class="lap-num">#${String(lap.number).padStart(2,'0')}</span><span class="lap-split">${formatMs(lap.split)}</span><span class="lap-total">${formatMs(lap.total)}</span></div>`;
      }).join('');
    }

    function formatMs(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const milli = Math.floor((ms % 1000) / 10);
      if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(milli).padStart(2,'0')}`;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(milli).padStart(2,'0')}`;
    }

    function clearLaps() { stopwatch.laps = []; renderLaps(); els.lapsArea.style.display = 'none'; }

    /* Presets */
    function renderPresets() {
      const presets = storage.getPresets();
      while (presets.length < 3) presets.push({ name: `Preset ${presets.length + 1}`, seconds: 0 });
      els.presetsList.innerHTML = presets.map((p, i) => `
        <button class="preset-btn" onclick="loadPreset(${i})">
          <span class="preset-name">${escapeHtml(p.name)}</span>
          <span class="preset-time">${formatDuration(p.seconds)}</span>
          <span class="preset-edit" onclick="event.stopPropagation(); savePreset(${i})">✎</span>
        </button>`).join('');
    }

    function loadPreset(index) {
      if (timer.status !== 'idle') return;
      const presets = storage.getPresets();
      if (presets[index] && presets[index].seconds > 0) {
        setInputSeconds(presets[index].seconds);
        timer.total = presets[index].seconds;
        timer.remaining = presets[index].seconds;
        saveTimerToStorage();
      }
    }

    function savePreset(index) {
      const presets = storage.getPresets();
      const name = prompt('Name this preset:', presets[index]?.name || `Preset ${index + 1}`);
      if (name === null) return;
      presets[index] = { name: name.trim() || `Preset ${index + 1}`, seconds: getInputSeconds() };
      storage.setPresets(presets);
      renderPresets();
    }

    function formatDuration(sec) {
      if (sec <= 0) return '--:--';
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    /* Inputs */
    function setupInputs() {
      [els.h, els.m, els.s].forEach(input => {
        input.addEventListener('change', () => { clampInput(input); saveTimerToStorage(); if (timer.status === 'idle') { timer.total = getInputSeconds(); timer.remaining = timer.total; } });
        input.addEventListener('blur', () => { clampInput(input); input.value = String(parseInt(input.value) || 0).padStart(2, '0'); });
        input.addEventListener('focus', () => input.select());
      });
    }

    function clampInput(input) {
      let v = parseInt(input.value) || 0;
      if (input.id !== 'h') v = Math.max(0, Math.min(59, v));
      else v = Math.max(0, Math.min(99, v));
      input.value = String(v).padStart(2, '0');
    }

    function setupWheel() {
      [els.h, els.m, els.s].forEach(input => {
        input.addEventListener('wheel', (e) => {
          if (timer.status !== 'idle') return;
          e.preventDefault();
          let v = (parseInt(input.value) || 0) + (e.deltaY < 0 ? 1 : -1);
          if (input.id !== 'h') v = Math.max(0, Math.min(59, v));
          else v = Math.max(0, Math.min(99, v));
          input.value = String(v).padStart(2, '0');
          saveTimerToStorage();
          timer.total = getInputSeconds(); timer.remaining = timer.total;
        }, { passive: false });
      });
    }

    /* Keyboard */
    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' && e.target.classList.contains('time-segment')) {
          if (e.key === 'Enter') e.target.blur();
          return;
        }
        if (e.code === 'Space') { e.preventDefault(); activeTab === 'timer' ? toggleTimer() : toggleStopwatch(); }
        if (e.code === 'KeyR') { e.preventDefault(); activeTab === 'timer' ? resetTimer() : resetStopwatch(); }
        if (e.code === 'KeyL' && activeTab === 'stopwatch') { e.preventDefault(); recordLap(); }
      });
    }

    /* Sound */
    function playAlarm() {
      if (muted) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        [880, 660, 440].forEach((freq, i) => {
          const osc = ctx.createOscillator(), gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.25);
          gain.gain.setValueAtTime(0.15, now + i * 0.25);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + 0.6);
          osc.start(now + i * 0.25); osc.stop(now + i * 0.25 + 0.6);
        });
      } catch (e) {}
    }

    function showNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body });
    }

    /* Toggles */
    els.btnMute.addEventListener('click', () => { muted = !muted; storage.setMute(muted); updateMuteIcon(); });
    function updateMuteIcon() { els.btnMute.textContent = muted ? '🔇' : '🔊'; }
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
    });

    init();
  </script>
</body>
</html>
