<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnrrKLMlbNuRyQFp--sGVx9o8-WNAIvjE",
            authDomain: "todolist-2bf64.firebaseapp.com",
            projectId: "todolist-2bf64",
            storageBucket: "todolist-2bf64.firebasestorage.app",
            messagingSenderId: "380104561381",
            appId: "1:380104561381:web:c87fad646470abfe707a0c"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.provider = new GoogleAuthProvider();
        window.signInWithPopup = signInWithPopup;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.collection = collection;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f5f5f7;
            --bg-card: #ffffff;
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #d2d2d7;
            --accent: #0071e3;
            --accent-light: #e8f4fd;
            --accent-gradient: linear-gradient(135deg, #0071e3, #42a5f5);
            --success: #34c759;
            --success-light: #e8f5e9;
            --warning: #ff9500;
            --danger: #ff3b30;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-card: #1c1c1e;
            --bg-secondary: rgba(28, 28, 30, 0.8);
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
            --text-tertiary: #48484a;
            --accent: #0a84ff;
            --accent-light: rgba(10, 132, 255, 0.15);
            --accent-gradient: linear-gradient(135deg, #0a84ff, #5ac8fa);
            --success: #30d158;
            --success-light: rgba(48, 209, 88, 0.15);
            --warning: #ff9f0a;
            --danger: #ff453a;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            position: relative;
        }

        /* Auth Section */
        .auth-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            text-align: center;
            transition: var(--transition);
        }

        .auth-section h2 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .auth-section p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 15px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: var(--bg-primary);
            border: 1.5px solid var(--text-tertiary);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .google-btn:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .google-btn svg { width: 20px; height: 20px; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .user-details { text-align: left; }
        .user-name { font-weight: 600; font-size: 16px; }
        .user-email { font-size: 13px; color: var(--text-secondary); }

        .logout-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1.5px solid var(--text-tertiary);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* Sync Status */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 12px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .sync-dot.offline { background: var(--text-tertiary); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .date-display {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 12px;
            font-weight: 500;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--bg-card);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            color: var(--text-secondary);
            font-size: 20px;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
            color: var(--accent);
        }

        /* Progress Section */
        .progress-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-title { font-size: 20px; font-weight: 600; }

        .progress-percentage {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            transition: var(--transition);
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stat-item { display: flex; align-items: center; gap: 6px; }

        .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .stat-dot.pending { background: var(--text-tertiary); }
        .stat-dot.completed { background: var(--success); }

        /* Quote */
        .quote-section {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px;
            font-size: 15px;
            color: var(--text-secondary);
            font-style: italic;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .quote-section.visible { opacity: 1; transform: translateY(0); }

        /* Input */
        .input-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .input-wrapper { display: flex; gap: 12px; margin-bottom: 16px; }

        .task-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .task-input::placeholder { color: var(--text-tertiary); }

        .task-input:focus {
            border-color: var(--accent);
            background: var(--bg-card);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .add-btn {
            padding: 16px 28px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 113, 227, 0.3);
        }

        .add-btn:active { transform: translateY(0); }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Priority */
        .priority-selector { display: flex; gap: 8px; flex-wrap: wrap; }

        .priority-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-right: 8px;
            display: flex;
            align-items: center;
        }

        .priority-btn {
            padding: 8px 16px;
            border: 1.5px solid var(--text-tertiary);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .priority-btn:hover { border-color: var(--accent); color: var(--accent); }

        .priority-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .priority-btn.active[data-priority="high"] { background: var(--danger); border-color: var(--danger); }
        .priority-btn.active[data-priority="medium"] { background: var(--warning); border-color: var(--warning); }
        .priority-btn.active[data-priority="low"] { background: var(--success); border-color: var(--success); }

        /* Filter */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; padding: 0 4px; }

        .filter-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 20px;
            transition: var(--transition);
            font-family: inherit;
            position: relative;
        }

        .filter-tab:hover { color: var(--text-primary); background: var(--bg-card); }
        .filter-tab.active { color: var(--accent); background: var(--accent-light); }

        .filter-tab .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: var(--text-tertiary);
            color: var(--bg-card);
            border-radius: 10px;
            font-size: 12px;
            margin-left: 6px;
            font-weight: 600;
        }

        .filter-tab.active .badge { background: var(--accent); }

        /* Task List */
        .task-list { display: flex; flex-direction: column; gap: 12px; }

        .task-item {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-secondary); }
        .task-item.removing { animation: slideOut 0.3s forwards; }

        @keyframes slideOut {
            to { opacity: 0; transform: translateX(100%); height: 0; padding: 0; margin: 0; }
        }

        /* Checkbox */
        .checkbox-wrapper { position: relative; width: 28px; height: 28px; flex-shrink: 0; }

        .custom-checkbox {
            width: 28px;
            height: 28px;
            border: 2.5px solid var(--text-tertiary);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            position: relative;
        }

        .custom-checkbox:hover { border-color: var(--accent); }
        .custom-checkbox.checked { background: var(--success); border-color: var(--success); }
        .custom-checkbox.checked::after { content: '✓'; color: white; font-size: 16px; font-weight: 700; }

        .checkbox-ripple {
            position: absolute;
            top: 50%; left: 50%;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--success);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0.3;
            pointer-events: none;
        }

        .checkbox-ripple.animate { animation: ripple 0.5s ease-out; }

        @keyframes ripple {
            to { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        .task-content { flex: 1; min-width: 0; }

        .task-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
            word-break: break-word;
        }

        .task-meta { display: flex; align-items: center; gap: 12px; margin-top: 6px; }

        .priority-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-badge.high { background: rgba(255, 59, 48, 0.12); color: var(--danger); }
        .priority-badge.medium { background: rgba(255, 149, 0, 0.12); color: var(--warning); }
        .priority-badge.low { background: rgba(52, 199, 89, 0.12); color: var(--success); }

        .task-time { font-size: 12px; color: var(--text-secondary); }

        .task-actions { display: flex; gap: 8px; opacity: 0; transition: var(--transition); }
        .task-item:hover .task-actions { opacity: 1; }

        .action-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 16px;
        }

        .action-btn:hover { background: var(--danger); color: white; transform: scale(1.1); }
        .action-btn.edit:hover { background: var(--accent); }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .empty-state p { font-size: 15px; }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid var(--text-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Confetti */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* Streak */
        .streak-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .streak-item { text-align: center; }
        .streak-number { font-size: 28px; font-weight: 700; color: var(--accent); }
        .streak-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .streak-divider { width: 1px; height: 40px; background: var(--text-tertiary); }

        /* ====== FOCUS TIMER MODAL (White Theme) ====== */
        .cosmos-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-primary);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .cosmos-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .cosmos-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            background: var(--bg-card);
            border: 1px solid var(--text-tertiary);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 28px;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }

        .cosmos-overlay.active .cosmos-card {
            transform: scale(1);
        }

        .cosmos-header {
            text-align: center;
        }

        .cosmos-header h2 {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .cosmos-header p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .cosmos-task-name {
            font-size: 0.95rem;
            color: var(--accent);
            margin-top: 10px;
            font-weight: 600;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cosmos-display-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
        }

        .cosmos-time-display {
            font-family: 'Inter', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1;
        }

        .cosmos-time-display.running {
            color: var(--accent);
            animation: cosmos-pulse-glow 2s ease-in-out infinite;
        }

        .cosmos-time-display.warning {
            color: var(--danger);
            animation: cosmos-pulse-glow 0.5s ease-in-out infinite;
        }

        .cosmos-time-display.flash {
            animation: cosmos-flash-red 0.4s ease-in-out 3;
        }

        @keyframes cosmos-pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes cosmos-flash-red {
            0%, 100% { color: var(--text-primary); }
            50% { color: var(--danger); }
        }

        .cosmos-time-segment {
            width: 2.3ch;
            background: transparent;
            border: none;
            color: inherit;
            font: inherit;
            text-align: center;
            padding: 8px 4px;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
            outline: none;
            caret-color: var(--accent);
        }

        .cosmos-time-segment:focus {
            background: var(--accent-light);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .cosmos-time-segment:disabled { opacity: 1; cursor: default; }
        .cosmos-time-segment::-webkit-outer-spin-button,
        .cosmos-time-segment::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .cosmos-time-segment { -moz-appearance: textfield; }

        .cosmos-time-separator {
            opacity: 0.4;
            margin-top: -6px;
            color: var(--text-secondary);
        }

        .cosmos-underline {
            width: 200px;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0.3;
            border-radius: 2px;
        }

        .cosmos-quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .cosmos-pill-btn {
            padding: 8px 18px;
            border-radius: 999px;
            border: 1.5px solid var(--text-tertiary);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cosmos-pill-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .cosmos-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .cosmos-btn-row { display: flex; gap: 12px; }

        .cosmos-btn {
            padding: 16px 24px;
            border-radius: var(--radius-md);
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .cosmos-btn-row .cosmos-btn {
            flex: 1;
        }

        .cosmos-btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        .cosmos-btn-primary:hover {
            box-shadow: 0 8px 25px rgba(0, 113, 227, 0.4);
            transform: translateY(-2px);
        }

        .cosmos-btn-primary:active { transform: translateY(0) scale(0.98); }

        .cosmos-btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1.5px solid var(--text-tertiary);
        }

        .cosmos-btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .cosmos-btn-full { width: 100%; }
        .cosmos-hidden { display: none !important; }

        /* Completion Overlay */
        .cosmos-completion {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            border-radius: var(--radius-lg);
        }

        .cosmos-completion.show { opacity: 1; pointer-events: all; }

        .cosmos-completion-message {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
        }

        .cosmos-completion-sub {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Focus button on task */
        .focus-btn {
            padding: 6px 14px;
            background: var(--accent-light);
            color: var(--accent);
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            margin-left: auto;
        }

        .focus-btn:hover { background: var(--accent); color: white; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 16px 28px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 3000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 500;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast-icon { font-size: 24px; }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 20px 16px; }
            .header h1 { font-size: 36px; }
            .input-wrapper { flex-direction: column; }
            .add-btn { width: 100%; justify-content: center; }
            .task-actions { opacity: 1; }
            .auth-section { padding: 24px; }
            .cosmos-card { padding: 28px 20px; }
            .cosmos-time-display { font-size: 2.8rem; letter-spacing: 3px; }
            .cosmos-btn { padding: 14px 20px; font-size: 0.95rem; }
            .cosmos-pill-btn { padding: 6px 14px; font-size: 0.8rem; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Calendar Section */
        .calendar-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }

        .calendar-nav {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-nav:hover { background: var(--accent); color: white; transform: scale(1.1); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            font-size: 14px;
            font-weight: 500;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid transparent;
        }

        .calendar-day:hover { transform: scale(1.1); box-shadow: var(--shadow-md); z-index: 10; }
        .calendar-day.today { border-color: var(--accent); font-weight: 700; }
        .calendar-day.empty { background: var(--bg-primary); color: var(--text-tertiary); cursor: default; }
        .calendar-day.empty:hover { transform: none; box-shadow: none; }
        .calendar-day.has-tasks { background: var(--accent-light); color: var(--accent); }
        .calendar-day.all-completed { background: var(--success-light); color: var(--success); }
        .calendar-day.partial { background: linear-gradient(135deg, var(--success-light) 50%, var(--accent-light) 50%); color: var(--text-primary); }
        .calendar-day .day-number { font-size: 14px; font-weight: 600; }
        .calendar-day .day-count { font-size: 10px; margin-top: 2px; opacity: 0.8; }

        .calendar-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--bg-primary);
        }

        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
        .legend-dot.empty { background: var(--bg-primary); border: 1px solid var(--text-tertiary); }
        .legend-dot.partial { background: linear-gradient(135deg, var(--success-light) 50%, var(--accent-light) 50%); }
        .legend-dot.full { background: var(--success-light); }

        @media (max-width: 600px) {
            .calendar-grid { gap: 4px; }
            .calendar-day { font-size: 12px; }
            .calendar-day .day-count { font-size: 9px; }
            .calendar-legend { gap: 12px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <button class="theme-toggle" id="themeToggleBtn" title="切換主題">🌙</button>
            <h1>Focus</h1>
            <p class="subtitle">加油！</p>
            <div class="date-display" id="dateDisplay"></div>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="authSection">
            <div id="authLoggedOut">
                <h2>歡迎使用 Focus Tasks</h2>
                <p>登入以同步你嘅任務到雲端，隨時隨地存取</p>
                <button class="google-btn" id="googleSignInBtn">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    使用 Google 登入
                </button>
            </div>
            <div id="authLoggedIn" style="display: none;">
                <div class="user-info">
                    <img class="user-avatar" id="userAvatar" src="" alt="Avatar">
                    <div class="user-details">
                        <div class="user-name" id="userName"></div>
                        <div class="user-email" id="userEmail"></div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">登出</button>
                <div class="sync-status">
                    <span class="sync-dot" id="syncDot"></span>
                    <span id="syncText">即時同步中</span>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainApp" style="display: none;">
            <!-- Streak Counter -->
            <div class="streak-section">
                <div class="streak-item">
                    <div class="streak-number" id="completedToday">0</div>
                    <div class="streak-label">今日完成</div>
                </div>
                <div class="streak-divider"></div>
                <div class="streak-item">
                    <div class="streak-number" id="currentStreak">0</div>
                    <div class="streak-label">連續日數</div>
                </div>
                <div class="streak-divider"></div>
                <div class="streak-item">
                    <div class="streak-number" id="totalTasks">0</div>
                    <div class="streak-label">總任務</div>
                </div>
            </div>

            <!-- Calendar Section -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <button class="calendar-nav" onclick="changeMonth(-1)">‹</button>
                    <span class="calendar-title" id="calendarTitle"></span>
                    <button class="calendar-nav" onclick="changeMonth(1)">›</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <div class="calendar-day-header">日</div>
                    <div class="calendar-day-header">一</div>
                    <div class="calendar-day-header">二</div>
                    <div class="calendar-day-header">三</div>
                    <div class="calendar-day-header">四</div>
                    <div class="calendar-day-header">五</div>
                    <div class="calendar-day-header">六</div>
                </div>
                <div class="calendar-legend">
                    <div class="legend-item"><span class="legend-dot empty"></span><span>無任務</span></div>
                    <div class="legend-item"><span class="legend-dot partial"></span><span>進行中</span></div>
                    <div class="legend-item"><span class="legend-dot full"></span><span>全部完成</span></div>
                </div>
            </div>

            <!-- Progress Section -->
            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-title">今日進度</span>
                    <span class="progress-percentage" id="progressPercentage">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-stats">
                    <div class="stat-item">
                        <span class="stat-dot pending"></span>
                        <span>待完成: <strong id="pendingCount">0</strong></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-dot completed"></span>
                        <span>已完成: <strong id="completedCount">0</strong></span>
                    </div>
                </div>
            </div>

            <!-- Quote Section -->
            <div class="quote-section" id="quoteSection"></div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" class="task-input" id="taskInput" placeholder="輸入新任務..." onkeypress="handleKeyPress(event)">
                    <button class="add-btn" id="addBtn">
                        <span>+</span>
                        <span>新增</span>
                    </button>
                </div>
                <div class="priority-selector">
                    <span class="priority-label">優先級:</span>
                    <button class="priority-btn" data-priority="low" onclick="setPriority('low')">輕鬆</button>
                    <button class="priority-btn active" data-priority="medium" onclick="setPriority('medium')">普通</button>
                    <button class="priority-btn" data-priority="high" onclick="setPriority('high')">緊急</button>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('all')">全部 <span class="badge" id="badgeAll">0</span></button>
                <button class="filter-tab" onclick="setFilter('pending')">待完成 <span class="badge" id="badgePending">0</span></button>
                <button class="filter-tab" onclick="setFilter('completed')">已完成 <span class="badge" id="badgeCompleted">0</span></button>
            </div>

            <!-- Task List -->
            <div class="task-list" id="taskList"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <h3>暫無任務</h3>
                <p>新增一個任務開始你嘅專注之旅</p>
            </div>
        </div>
    </div>

    <!-- ====== FOCUS TIMER MODAL ====== -->
    <div class="cosmos-overlay" id="cosmosTimer">
        <div class="cosmos-card">
            <!-- Completion overlay inside card -->
            <div class="cosmos-completion" id="cosmosCompletion">
                <div class="cosmos-completion-message">⏰ 時間到！</div>
                <div class="cosmos-completion-sub">專注任務完成</div>
                <button class="cosmos-btn cosmos-btn-primary" style="max-width: 200px; padding: 14px 32px;" onclick="dismissCosmosCompletion()">確認</button>
            </div>

            <div class="cosmos-header">
                <h2>🍅 專注計時</h2>
                <p>專注完成這個任務</p>
                <div class="cosmos-task-name" id="cosmosTaskName"></div>
            </div>

            <div class="cosmos-display-area">
                <div class="cosmos-time-display" id="cosmosTimeDisplay">
                    <input type="number" class="cosmos-time-segment" id="cosmos-h" min="0" max="99" value="00">
                    <span class="cosmos-time-separator">:</span>
                    <input type="number" class="cosmos-time-segment" id="cosmos-m" min="0" max="59" value="25">
                    <span class="cosmos-time-separator">:</span>
                    <input type="number" class="cosmos-time-segment" id="cosmos-s" min="0" max="59" value="00">
                </div>
                <div class="cosmos-underline"></div>
            </div>

            <div class="cosmos-quick-actions" id="cosmosQuickActions">
                <button class="cosmos-pill-btn" onclick="cosmosAddTime(30)">+0:30</button>
                <button class="cosmos-pill-btn" onclick="cosmosAddTime(60)">+1:00</button>
                <button class="cosmos-pill-btn" onclick="cosmosAddTime(300)">+5:00</button>
                <button class="cosmos-pill-btn" onclick="cosmosAddTime(600)">+10:00</button>
            </div>

            <div class="cosmos-controls">
                <button id="cosmos-btn-start" class="cosmos-btn cosmos-btn-primary cosmos-btn-full" onclick="cosmosToggleTimer()">▶ 開始</button>
                <div id="cosmos-controls-active" class="cosmos-btn-row cosmos-hidden">
                    <button id="cosmos-btn-pause" class="cosmos-btn cosmos-btn-primary" onclick="cosmosToggleTimer()">⏸ 暫停</button>
                    <button class="cosmos-btn cosmos-btn-secondary" onclick="cosmosResetTimer()">🔄 重置</button>
                </div>
                <button class="cosmos-btn cosmos-btn-secondary cosmos-btn-full" onclick="closeCosmosTimer()">✕ 關閉</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">🏆</span>
        <span id="toastMessage">成就解鎖！</span>
    </div>

    <script type="module">
        // ====== STATE ======
        let currentCalendarDate = new Date();
        let tasks = [];
        let currentUser = null;
        let currentPriority = 'medium';
        let currentFilter = 'all';
        let currentStreak = 0;
        let lastActiveDate = '';
        let totalCompleted = 0;
        let unsubscribeTasks = null;
        let isOnline = true;

        // Timer state
        let cosmosTimerState = { total: 1500, remaining: 1500, status: 'idle', interval: null, endTime: 0 };
        let currentFocusTask = null;

        // Quotes
        const quotes = [
            "千里之行，始於足下", "專注於當下，成就未來", "小步前進，也是進步",
            "保持專注，你做得很好", "每一個完成的任務都是勝利", "專注的力量無可限量",
            "今天比昨天更好", "堅持就是勝利", "心無旁騖，事無不成",
            "一次只做一件事，做到極致", "當下即是全部", "專注，是對時間最溫柔的尊重",
            "日拱一卒，功不唐捐", "不積跬步，無以至千里",
            "每天進步 1%，一年後你會強大 37 倍", "完成比完美更重要",
            "先做起來，再做好它", "行動是解決焦慮最好的藥",
            "Focus on being productive instead of busy.",
            "The successful warrior is the average man, with laser-like focus.",
            "Wherever you are, be all there.",
            "Starve your distractions, feed your focus.",
            "Done is better than perfect.",
            "Start where you are. Use what you have. Do what you can.",
            "Progress, not perfection.",
            "It always seems impossible until it's done."
        ];

        const progressMessages = {
            25: "已經完成四分之一！繼續加油 💪",
            50: "完成一半了！保持這個勢頭 🔥",
            75: "就快到了！最後衝刺 🚀",
            100: "太棒了！全部完成！🎉"
        };

        // ====== AUTH ======
        window.signInWithGoogle = async function() {
            try {
                const result = await window.signInWithPopup(window.auth, window.provider);
                currentUser = result.user;
                showToast('✅ 登入成功！');
            } catch (error) {
                console.error('Login error:', error);
                showToast('❌ 登入失敗: ' + error.message);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const googleBtn = document.getElementById('googleSignInBtn');
            if (googleBtn) googleBtn.addEventListener('click', window.signInWithGoogle);
            const addBtn = document.getElementById('addBtn');
            if (addBtn) addBtn.addEventListener('click', window.addTask);
            const themeBtn = document.getElementById('themeToggleBtn');
            if (themeBtn) themeBtn.addEventListener('click', window.toggleTheme);
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', window.signOutUser);
        });

        window.signOutUser = async function() {
            try {
                await window.signOut(window.auth);
                if (unsubscribeTasks) { unsubscribeTasks(); unsubscribeTasks = null; }
                currentUser = null;
                tasks = [];
                showToast('👋 已登出');
            } catch (error) { console.error('Logout error:', error); }
        };

        window.onAuthStateChanged(window.auth, (user) => {
            currentUser = user;
            updateAuthUI();
            if (user) { loadUserData(); setupRealtimeListener(); }
            else {
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('authLoggedOut').style.display = 'block';
                document.getElementById('authLoggedIn').style.display = 'none';
            }
        });

        function updateAuthUI() {
            if (currentUser) {
                document.getElementById('authLoggedOut').style.display = 'none';
                document.getElementById('authLoggedIn').style.display = 'block';
                document.getElementById('userName').textContent = currentUser.displayName || '用戶';
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('userAvatar').src = currentUser.photoURL || 'https://via.placeholder.com/48';
                document.getElementById('mainApp').style.display = 'block';
            }
        }

        // ====== FIRESTORE DATA ======
        async function loadUserData() {
            if (!currentUser) return;
            try {
                const userDocRef = window.doc(window.db, 'users', currentUser.uid);
                const userDoc = await window.getDoc(userDocRef);
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    currentStreak = data.currentStreak || 0;
                    lastActiveDate = data.lastActiveDate || '';
                    totalCompleted = data.totalCompleted || 0;
                    document.getElementById('currentStreak').textContent = currentStreak;
                    document.getElementById('totalTasks').textContent = totalCompleted;
                } else {
                    await window.setDoc(userDocRef, { currentStreak: 0, lastActiveDate: '', totalCompleted: 0, createdAt: window.serverTimestamp() });
                }
                checkStreak();
            } catch (error) { console.error('Error loading user data:', error); }
        }

        function setupRealtimeListener() {
            if (!currentUser) return;
            if (unsubscribeTasks) unsubscribeTasks();
            const tasksRef = window.collection(window.db, 'users', currentUser.uid, 'tasks');
            const q = window.query(tasksRef, window.orderBy('createdAt', 'desc'));
            unsubscribeTasks = window.onSnapshot(q, (snapshot) => {
                tasks = [];
                snapshot.forEach((doc) => { tasks.push({ id: doc.id, ...doc.data() }); });
                renderTasks();
                updateProgress();
                updateSyncStatus(true);
            }, (error) => { console.error('Realtime listener error:', error); updateSyncStatus(false); });
        }

        function updateSyncStatus(online) {
            isOnline = online;
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (online) { dot.classList.remove('offline'); text.textContent = '即時同步中'; }
            else { dot.classList.add('offline'); text.textContent = '離線模式'; }
        }

        // ====== TASK OPERATIONS ======
        window.addTask = async function() {
            if (!currentUser) { showToast('⚠️ 請先登入'); return; }
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) { input.focus(); return; }
            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            try {
                const tasksRef = window.collection(window.db, 'users', currentUser.uid, 'tasks');
                const newTaskRef = window.doc(tasksRef);
                await window.setDoc(newTaskRef, { text, completed: false, priority: currentPriority, createdAt: window.serverTimestamp(), completedAt: null });
                input.value = '';
                setPriority('medium');
                showToast('✅ 任務已新增');
            } catch (error) { console.error('Error adding task:', error); showToast('❌ 新增失敗'); }
            finally { btn.disabled = false; }
        };

        window.toggleTask = async function(id) {
            if (!currentUser) return;
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            const newCompleted = !task.completed;
            const taskRef = window.doc(window.db, 'users', currentUser.uid, 'tasks', id);
            try {
                await window.updateDoc(taskRef, { completed: newCompleted, completedAt: newCompleted ? new Date().toISOString() : null });
                if (newCompleted) { totalCompleted++; await updateUserStats(); updateStreak(); checkAchievements(); }
            } catch (error) { console.error('Error toggling task:', error); showToast('❌ 更新失敗'); }
        };

        window.deleteTask = async function(id) {
            if (!currentUser) return;
            const taskElement = document.querySelector(`[data-task-id="${id}"]`);
            if (taskElement) {
                taskElement.classList.add('removing');
                try {
                    const taskRef = window.doc(window.db, 'users', currentUser.uid, 'tasks', id);
                    await window.deleteDoc(taskRef);
                    showToast('🗑️ 任務已刪除');
                } catch (error) { console.error('Error deleting task:', error); showToast('❌ 刪除失敗'); }
            }
        };

        window.editTask = async function(id) {
            if (!currentUser) return;
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            const newText = prompt('編輯任務:', task.text);
            if (newText !== null && newText.trim() !== '') {
                try {
                    const taskRef = window.doc(window.db, 'users', currentUser.uid, 'tasks', id);
                    await window.updateDoc(taskRef, { text: newText.trim() });
                    showToast('✏️ 已更新');
                } catch (error) { console.error('Error editing task:', error); showToast('❌ 更新失敗'); }
            }
        };

        async function updateUserStats() {
            if (!currentUser) return;
            const userRef = window.doc(window.db, 'users', currentUser.uid);
            try { await window.updateDoc(userRef, { totalCompleted, lastActiveDate: new Date().toDateString(), currentStreak }); }
            catch (error) { console.error('Error updating stats:', error); }
        }

        // ====== STREAK LOGIC ======
        function checkStreak() {
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (lastActiveDate === yesterday) { /* continue */ }
            else if (lastActiveDate !== today) { if (lastActiveDate !== '' && lastActiveDate !== yesterday) currentStreak = 0; }
            document.getElementById('currentStreak').textContent = currentStreak;
            document.getElementById('totalTasks').textContent = totalCompleted;
        }

        function updateStreak() {
            const today = new Date().toDateString();
            if (lastActiveDate !== today) {
                lastActiveDate = today;
                currentStreak++;
                document.getElementById('currentStreak').textContent = currentStreak;
                if (currentStreak >= 3) showToast(`🔥 ${currentStreak}日連續！太厲害了！`);
            }
        }

        // ====== UI FUNCTIONS ======
        window.setPriority = function(priority) {
            currentPriority = priority;
            document.querySelectorAll('.priority-btn').forEach(btn => { btn.classList.toggle('active', btn.dataset.priority === priority); });
        };

        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => { tab.classList.remove('active'); });
            event.target.closest('.filter-tab').classList.add('active');
            renderTasks();
        };

        window.handleKeyPress = function(event) { if (event.key === 'Enter') addTask(); };

        function renderTasks() {
            const list = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            let filteredTasks = tasks;
            if (currentFilter === 'pending') filteredTasks = tasks.filter(t => !t.completed);
            else if (currentFilter === 'completed') filteredTasks = tasks.filter(t => t.completed);

            filteredTasks.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                const priorityOrder = { high: 0, medium: 1, low: 2 };
                return priorityOrder[a.priority] - priorityOrder[b.priority];
            });

            if (filteredTasks.length === 0) { list.style.display = 'none'; emptyState.style.display = 'block'; }
            else {
                list.style.display = 'flex';
                emptyState.style.display = 'none';
                list.innerHTML = filteredTasks.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}" data-task-id="${task.id}">
                        <div class="checkbox-wrapper" onclick="toggleTask('${task.id}')">
                            <div class="custom-checkbox ${task.completed ? 'checked' : ''}"></div>
                            <div class="checkbox-ripple"></div>
                        </div>
                        <div class="task-content">
                            <div class="task-text">${escapeHtml(task.text)}</div>
                            <div class="task-meta">
                                <span class="priority-badge ${task.priority}">${getPriorityLabel(task.priority)}</span>
                                <span class="task-time">${formatTime(task.createdAt)}</span>
                            </div>
                        </div>
                        ${!task.completed ? `<button class="focus-btn" onclick="event.stopPropagation(); openCosmosTimer('${task.id}')">🍅 專注</button>` : ''}
                        <div class="task-actions">
                            <button class="action-btn edit" onclick="event.stopPropagation(); editTask('${task.id}')" title="編輯">✏️</button>
                            <button class="action-btn" onclick="event.stopPropagation(); deleteTask('${task.id}')" title="刪除">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }
            updateBadges();
            renderCalendar();
        }

        function getPriorityLabel(priority) { return { low: '輕鬆', medium: '普通', high: '緊急' }[priority] || priority; }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleTimeString('zh-Hant', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function updateProgress() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressPercentage').textContent = percentage + '%';
            document.getElementById('pendingCount').textContent = total - completed;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('completedToday').textContent = completed;
            const quoteSection = document.getElementById('quoteSection');
            if (progressMessages[percentage] && percentage > 0) {
                quoteSection.classList.remove('visible');
                setTimeout(() => { quoteSection.textContent = progressMessages[percentage]; quoteSection.classList.add('visible'); }, 50);
            } else if (percentage === 0 && total === 0) { showRandomQuote(); }
            if (percentage === 100 && total > 0) { fireConfetti(); showToast('🎉 恭喜！所有任務完成！'); }
        }

        function updateBadges() {
            const total = tasks.length;
            const pending = tasks.filter(t => !t.completed).length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('badgeAll').textContent = total;
            document.getElementById('badgePending').textContent = pending;
            document.getElementById('badgeCompleted').textContent = completed;
        }

        function checkAchievements() {
            const completed = tasks.filter(t => t.completed).length;
            if (completed === 1) showToast('🌟 完成第一個任務！');
            else if (completed === 5) showToast('🔥 已完成 5 個任務！');
            else if (completed === 10) showToast('💪 已完成 10 個任務！');
            else if (completed === 25) showToast('🏆 已完成 25 個任務！超級專注！');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function showRandomQuote() {
            const quoteSection = document.getElementById('quoteSection');
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            quoteSection.classList.remove('visible');
            quoteSection.textContent = `"${randomQuote}"`;
            setTimeout(() => { quoteSection.classList.add('visible'); }, 50);
        }

        setInterval(() => {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            if (!progressMessages[percentage] || percentage === 0) showRandomQuote();
        }, 10000);

        // ====== FOCUS TIMER ======
        function getCosmosInputSeconds() {
            const h = parseInt(document.getElementById('cosmos-h').value) || 0;
            const m = Math.min(59, parseInt(document.getElementById('cosmos-m').value) || 0);
            const s = Math.min(59, parseInt(document.getElementById('cosmos-s').value) || 0);
            return h * 3600 + m * 60 + s;
        }

        function setCosmosInputSeconds(totalSecs) {
            const h = Math.floor(totalSecs / 3600);
            const m = Math.floor((totalSecs % 3600) / 60);
            const s = totalSecs % 60;
            document.getElementById('cosmos-h').value = String(h).padStart(2, '0');
            document.getElementById('cosmos-m').value = String(m).padStart(2, '0');
            document.getElementById('cosmos-s').value = String(s).padStart(2, '0');
        }

        window.openCosmosTimer = function(taskId) {
            currentFocusTask = taskId;
            const task = tasks.find(t => t.id === taskId);
            document.getElementById('cosmosTaskName').textContent = task ? task.text : '';
            document.getElementById('cosmosTimer').classList.add('active');
            cosmosResetTimer();
        };

        window.closeCosmosTimer = function() {
            document.getElementById('cosmosTimer').classList.remove('active');
            if (cosmosTimerState.status === 'running') {
                clearInterval(cosmosTimerState.interval);
                cosmosTimerState.status = 'idle';
            }
            cosmosResetTimer();
        };

        window.cosmosAddTime = function(seconds) {
            if (cosmosTimerState.status !== 'idle') return;
            let current = getCosmosInputSeconds() + seconds;
            setCosmosInputSeconds(current);
        };

        window.cosmosToggleTimer = function() {
            if (cosmosTimerState.status === 'running') cosmosPauseTimer();
            else cosmosStartTimer();
        };

        function cosmosStartTimer() {
            const display = document.getElementById('cosmosTimeDisplay');
            const inputs = [document.getElementById('cosmos-h'), document.getElementById('cosmos-m'), document.getElementById('cosmos-s')];

            if (cosmosTimerState.status === 'idle') {
                cosmosTimerState.total = getCosmosInputSeconds();
                cosmosTimerState.remaining = cosmosTimerState.total;
                if (cosmosTimerState.total <= 0) return;
            }

            cosmosTimerState.status = 'running';
            cosmosTimerState.endTime = Date.now() + cosmosTimerState.remaining * 1000;
            inputs.forEach(i => i.disabled = true);
            display.classList.add('running');
            document.getElementById('cosmos-btn-start').classList.add('cosmos-hidden');
            document.getElementById('cosmos-controls-active').classList.remove('cosmos-hidden');
            document.getElementById('cosmosQuickActions').style.opacity = '0.3';
            document.getElementById('cosmosQuickActions').style.pointerEvents = 'none';

            cosmosTimerState.interval = setInterval(() => {
                const now = Date.now();
                const rem = Math.ceil((cosmosTimerState.endTime - now) / 1000);
                if (rem <= 0) {
                    cosmosTimerState.remaining = 0;
                    setCosmosInputSeconds(0);
                    cosmosCompleteTimer();
                } else {
                    cosmosTimerState.remaining = rem;
                    setCosmosInputSeconds(rem);
                    cosmosCheckWarning();
                }
            }, 100);
        }

        function cosmosPauseTimer() {
            cosmosTimerState.status = 'paused';
            clearInterval(cosmosTimerState.interval);
            document.getElementById('cosmosTimeDisplay').classList.remove('running');
            document.getElementById('cosmos-btn-start').textContent = '▶ 繼續';
            document.getElementById('cosmos-btn-start').classList.remove('cosmos-hidden');
            document.getElementById('cosmos-controls-active').classList.add('cosmos-hidden');
        }

        window.cosmosResetTimer = function() {
            cosmosTimerState.status = 'idle';
            clearInterval(cosmosTimerState.interval);
            cosmosTimerState.total = 1500;
            cosmosTimerState.remaining = 1500;
            setCosmosInputSeconds(1500);
            const display = document.getElementById('cosmosTimeDisplay');
            display.classList.remove('running', 'warning', 'flash');
            const inputs = [document.getElementById('cosmos-h'), document.getElementById('cosmos-m'), document.getElementById('cosmos-s')];
            inputs.forEach(i => i.disabled = false);
            document.getElementById('cosmos-btn-start').textContent = '▶ 開始';
            document.getElementById('cosmos-btn-start').classList.remove('cosmos-hidden');
            document.getElementById('cosmos-controls-active').classList.add('cosmos-hidden');
            document.getElementById('cosmosQuickActions').style.opacity = '1';
            document.getElementById('cosmosQuickActions').style.pointerEvents = 'auto';
        };

        function cosmosCompleteTimer() {
            clearInterval(cosmosTimerState.interval);
            cosmosTimerState.status = 'idle';
            const inputs = [document.getElementById('cosmos-h'), document.getElementById('cosmos-m'), document.getElementById('cosmos-s')];
            inputs.forEach(i => i.disabled = false);
            document.getElementById('cosmos-btn-start').textContent = '▶ 開始';
            document.getElementById('cosmos-btn-start').classList.remove('cosmos-hidden');
            document.getElementById('cosmos-controls-active').classList.add('cosmos-hidden');
            document.getElementById('cosmosTimeDisplay').classList.add('flash');
            document.getElementById('cosmosTimeDisplay').classList.remove('running', 'warning');
            document.getElementById('cosmosQuickActions').style.opacity = '1';
            document.getElementById('cosmosQuickActions').style.pointerEvents = 'auto';

            cosmosPlayAlarm();
            document.getElementById('cosmosCompletion').classList.add('show');

            if (currentFocusTask) {
                toggleTask(currentFocusTask);
            }
        }

        window.dismissCosmosCompletion = function() {
            document.getElementById('cosmosCompletion').classList.remove('show');
            document.getElementById('cosmosTimeDisplay').classList.remove('flash');
            closeCosmosTimer();
            showToast('⏰ 專注時間結束！休息一下吧');
        };

        function cosmosCheckWarning() {
            const display = document.getElementById('cosmosTimeDisplay');
            const pct = cosmosTimerState.total > 0 ? cosmosTimerState.remaining / cosmosTimerState.total : 1;
            if (pct <= 0.1 && cosmosTimerState.remaining > 0) display.classList.add('warning');
            else display.classList.remove('warning');
        }

        function cosmosPlayAlarm() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const now = ctx.currentTime;
                [880, 660, 440].forEach((freq, i) => {
                    const osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.25);
                    gain.gain.setValueAtTime(0.15, now + i * 0.25);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + 0.6);
                    osc.start(now + i * 0.25); osc.stop(now + i * 0.25 + 0.6);
                });
            } catch (e) {}
        }

        // Setup timer inputs
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = [document.getElementById('cosmos-h'), document.getElementById('cosmos-m'), document.getElementById('cosmos-s')];
            inputs.forEach(input => {
                input.addEventListener('blur', () => {
                    let v = parseInt(input.value) || 0;
                    if (input.id !== 'cosmos-h') v = Math.max(0, Math.min(59, v));
                    else v = Math.max(0, Math.min(99, v));
                    input.value = String(v).padStart(2, '0');
                });
                input.addEventListener('focus', () => input.select());
                input.addEventListener('wheel', (e) => {
                    if (cosmosTimerState.status !== 'idle') return;
                    e.preventDefault();
                    let v = (parseInt(input.value) || 0) + (e.deltaY < 0 ? 1 : -1);
                    if (input.id !== 'cosmos-h') v = Math.max(0, Math.min(59, v));
                    else v = Math.max(0, Math.min(99, v));
                    input.value = String(v).padStart(2, '0');
                }, { passive: false });
            });
        });

        // ====== CONFETTI ======
        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            const colors = ['#0071e3', '#34c759', '#ff9500', '#ff3b30', '#5856d6', '#af52de'];
            for (let i = 0; i < 150; i++) {
                particles.push({ x: canvas.width / 2, y: canvas.height / 2, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 5, color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 8 + 4, rotation: Math.random() * 360, rotationSpeed: (Math.random() - 0.5) * 10, life: 1 });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                particles.forEach(p => {
                    if (p.life > 0) {
                        alive = true;
                        p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.01; p.rotation += p.rotationSpeed;
                        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
                        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                    }
                });
                if (alive) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
        }

        // ====== THEME ======
        window.toggleTheme = function() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); document.querySelector('.theme-toggle').textContent = '🌙'; }
            else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); document.querySelector('.theme-toggle').textContent = '☀️'; }
        };

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.querySelector('.theme-toggle').textContent = '☀️'; }
        }

        // ====== DATE ======
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-Hant', options);
        }

        // ====== CALENDAR ======
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            title.textContent = `${year}年 ${month + 1}月`;
            const headers = grid.querySelectorAll('.calendar-day-header');
            grid.innerHTML = '';
            headers.forEach(h => grid.appendChild(h));
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startPadding = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            const today = new Date();

            for (let i = 0; i < startPadding; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day empty';
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayData = getDayTaskData(dateStr);
                let cellClass = 'calendar-day';
                if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) cellClass += ' today';
                if (dayData.total > 0) {
                    if (dayData.completed === dayData.total) cellClass += ' all-completed';
                    else if (dayData.completed > 0) cellClass += ' partial';
                    else cellClass += ' has-tasks';
                }
                cell.className = cellClass;
                cell.innerHTML = `<span class="day-number">${day}</span>${dayData.total > 0 ? `<span class="day-count">${dayData.completed}/${dayData.total}</span>` : ''}`;
                cell.onclick = () => showDayDetail(year, month, day, dateStr);
                grid.appendChild(cell);
            }
        }

        function getDayTaskData(dateStr) {
            const dayTasks = tasks.filter(t => {
                if (!t.createdAt) return false;
                const taskDate = t.createdAt.toDate ? t.createdAt.toDate() : new Date(t.createdAt);
                const taskDateStr = `${taskDate.getFullYear()}-${String(taskDate.getMonth() + 1).padStart(2, '0')}-${String(taskDate.getDate()).padStart(2, '0')}`;
                return taskDateStr === dateStr;
            });
            return { total: dayTasks.length, completed: dayTasks.filter(t => t.completed).length, tasks: dayTasks };
        }

        window.changeMonth = function(delta) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta); renderCalendar(); };

        function showDayDetail(year, month, day, dateStr) {
            const dayData = getDayTaskData(dateStr);
            if (dayData.tasks.length === 0) return;
            const dateDisplay = `${year}年${month + 1}月${day}日`;
            const content = `${dateDisplay}\n\n任務列表 (${dayData.completed}/${dayData.total} 完成)\n` + dayData.tasks.map(t => `${t.completed ? '✓' : '○'} ${t.text}`).join('\n');
            alert(content);
        }

        // ====== INIT ======
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            loadTheme();
            showRandomQuote();
            renderCalendar();
        });

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
